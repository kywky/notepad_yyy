name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 0.3.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore stable test signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: notepad-plus-debug-keystore-v1

      - name: Create test signing key
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -dname "CN=Notepad Plus Test,O=kywky,C=CN" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Sync Android project
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: notepad-plus-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Remove previous release APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/debug-latest" \
            --jq '.assets[] | select(.name == "app-debug.apk") | .id' 2>/dev/null || true)"
          if [ -n "$asset_id" ]; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          fi

      - name: Publish debug release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          publish() {
            set +e
            output="$("$@" 2>&1)"
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              output="${output//'%'/'%25'}"
              output="${output//$'\n'/'%0A'}"
              output="${output//$'\r'/'%0D'}"
              echo "::error title=APK release failed::$output"
              return "$status"
            fi
          }
          if gh release view debug-latest >/dev/null 2>&1; then
            publish gh release upload debug-latest \
              android/app/build/outputs/apk/debug/app-debug.apk \
              --clobber
          else
            publish gh release create debug-latest \
              android/app/build/outputs/apk/debug/app-debug.apk \
              --target "$GITHUB_SHA" \
              --title "Compatibility Test APK" \
              --prerelease
          fi
